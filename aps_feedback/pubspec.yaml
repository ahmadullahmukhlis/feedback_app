name: aps_feedback
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter


  cupertino_icons: ^1.0.8

  # Media
  image_picker: ^1.0.7

  # Biometrics
  local_auth: ^3.0.0
  google_fonts: ^6.1.0
  # OAuth & Deep Links (FIXED)
  url_launcher: ^6.3.0
  app_links: ^7.0.0
  flutter_web_auth_2: ^4.1.0
  flutter_secure_storage: ^10.0.0
  dio: ^5.6.0
    # Reverb WebSocket Client
  pusher_reverb_flutter: ^0.0.3
  dart_pusher_channels: ^1.2.3

  firebase_messaging: ^15.1.0
  flutter_local_notifications: ^19.5.0
  firebase_core: ^3.4.0
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2


dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  intl_utils: ^2.8.13

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/logo.png

flutter:
  uses-material-design: true
  assets:
    - assets/logo.png
